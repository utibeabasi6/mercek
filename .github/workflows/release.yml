name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# tauri-action builds the macOS bundles (.app + .dmg, per bundle.targets) and
# attaches them to a DRAFT GitHub Release for the tag. Publish the draft when
# you're ready. Manual dispatch is also supported for dry runs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.triple }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.triple }}

      - name: Install JS deps
        # tauri-action runs the beforeBuildCommand (`pnpm build`) but does not
        # install dependencies — do that first.
        run: pnpm install --frozen-lockfile

      # Optional macOS signing + notarisation. Runs only when the secrets are set;
      # otherwise the build is unsigned (Gatekeeper warns on launch but still builds).
      # The signing/notarisation vars are forwarded to the build step via $GITHUB_ENV
      # ONLY when configured — passing an empty APPLE_SIGNING_IDENTITY makes Tauri try
      # to sign with identity "" and fail.
      - name: Configure Apple signing (optional)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$SIGNING_IDENTITY" ]; then
            echo "Apple signing secrets not set — building unsigned."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f cert.p12
          # Only now that signing is configured, expose the vars to the build step.
          {
            echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"
          echo "Apple signing configured."

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_* signing/notarisation vars are injected by the previous step via
          # $GITHUB_ENV, and only when configured. Their absence here = unsigned build.
        with:
          # The Tauri project lives at the repo root (src-tauri/), so projectPath
          # defaults to "." — no need to set it.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Mercek ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}"
          releaseBody: "See the [CHANGELOG](https://github.com/utibeabasi6/mercek/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          # No auto-updater is configured yet. To enable it later: turn on the
          # Tauri updater plugin, set TAURI_SIGNING_PRIVATE_KEY(/_PASSWORD)
          # secrets, and flip this to true.
          includeUpdaterJson: false
          args: ${{ matrix.args }}
